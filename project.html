<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Content Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
  }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }

  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  .card {
    background: #16161f;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .input-row { display: flex; gap: 12px; }

  input[type="text"] {
    flex: 1;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e8e8f0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: #7c3aed; }
  input[type="text"]::placeholder { color: #444; }

  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: white;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-copy {
    background: #1e1e2e;
    color: #aaa;
    border: 1px solid #2a2a3a;
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn-copy:hover { color: #fff; border-color: #555; }

  .platforms { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

  .platform-toggle {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .platform-toggle.active {
    background: #7c3aed22;
    border-color: #7c3aed;
    color: #a78bfa;
  }

  .status-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: #0f0f13;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    margin-bottom: 24px;
  }

  .status-bar.visible { display: flex; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #2a2a3a;
    border-top-color: #7c3aed;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-text { font-size: 14px; color: #888; }
  .status-step { font-size: 12px; color: #555; margin-top: 2px; }

  .trends-section { margin-bottom: 24px; }

  .trends-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }

  .trend-chip {
    background: #0f0f13;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
  }

  .trend-chip .trend-num {
    font-size: 11px;
    color: #7c3aed;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .trend-chip .trend-name { color: #ccc; font-weight: 500; }

  .posts-section { display: flex; flex-direction: column; gap: 20px; }

  .post-card {
    background: #16161f;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #1e1e2e;
    background: #0f0f13;
  }

  .post-meta { display: flex; align-items: center; gap: 10px; }

  .platform-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .badge-linkedin { background: #0a66c233; color: #5ba4f5; border: 1px solid #0a66c244; }
  .badge-x { background: #ffffff14; color: #ccc; border: 1px solid #ffffff22; }

  .post-type {
    font-size: 12px;
    color: #555;
    background: #1e1e2e;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .post-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    display: flex;
    justify-content: flex-end;
    padding: 10px 14px;
    border-top: 1px solid #1e1e2e;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #444;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .section-label {
    font-size: 12px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .error-msg {
    background: #2a1515;
    border: 1px solid #4a2020;
    border-radius: 10px;
    padding: 14px 18px;
    color: #f87171;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">✦</div>
  <div>
    <h1>Social Content Generator</h1>
    <p>Тренды → Посты за минуты, без Co-work</p>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Ваша ниша</div>
    <div class="input-row">
      <input type="text" id="nicheInput" placeholder="Например: AI in business, SaaS marketing, Web3..." value="AI in business" />
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">
        Генерировать →
      </button>
    </div>
    <div class="platforms">
      <button class="platform-toggle active" id="toggle-linkedin" onclick="togglePlatform('linkedin')">LinkedIn</button>
      <button class="platform-toggle active" id="toggle-x" onclick="togglePlatform('x')">X (Twitter)</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <div>
      <div class="status-text" id="statusText">Ищем тренды...</div>
      <div class="status-step" id="statusStep">Анализируем актуальные посты</div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="output">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <h3>Введите нишу и нажмите «Генерировать»</h3>
      <p>Система найдет горячие тренды и создаст<br>готовые посты для LinkedIn и X</p>
    </div>
  </div>

</div>

<script>
const platforms = { linkedin: true, x: true };

function togglePlatform(p) {
  platforms[p] = !platforms[p];
  document.getElementById('toggle-' + p).classList.toggle('active', platforms[p]);
}

function setStatus(text, step) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusStep').textContent = step;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

async function generate() {
  const niche = document.getElementById('nicheInput').value.trim();
  if (!niche) return;

  const wantLinkedIn = platforms.linkedin;
  const wantX = platforms.x;

  if (!wantLinkedIn && !wantX) {
    showError('Выберите хотя бы одну платформу.');
    return;
  }

  hideError();
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('statusBar').classList.add('visible');
  document.getElementById('output').innerHTML = '';

  setStatus('Ищем актуальные тренды...', `Ниша: "${niche}"`);

  const platformList = [];
  if (wantLinkedIn) platformList.push('LinkedIn (3 поста)');
  if (wantX) platformList.push('X/Twitter (3 поста, до 280 символов каждый)');

  const systemPrompt = `Ты — эксперт по контент-маркетингу и трендам в социальных сетях. Ты создаешь вирусный, человечный контент на основе реальных трендов.

Твои посты:
- Звучат как живой человек, не как ИИ
- Не используют клише ("В современном мире...", "Давайте поговорим о...")
- Не злоупотребляют эмодзи (максимум 1-2 уместных)
- Разные по формату: одни — мнение, другие — инсайт, третьи — вопрос к аудитории
- LinkedIn посты: 150-300 слов, профессиональный но живой тон
- X посты: строго до 280 символов, острые и цепляющие

Отвечай ТОЛЬКО в формате JSON (без markdown-обёртки, без пояснений), строго по схеме:
{
  "trends": [
    {"rank": 1, "topic": "..."},
    {"rank": 2, "topic": "..."},
    {"rank": 3, "topic": "..."},
    {"rank": 4, "topic": "..."},
    {"rank": 5, "topic": "..."}
  ],
  "posts": [
    {
      "platform": "linkedin",
      "type": "educational|opinion|engaging",
      "content": "..."
    }
  ]
}`;

  const userPrompt = `Используй веб-поиск чтобы найти самые горячие тренды прямо сейчас в нише: "${niche}".

Найди актуальные посты, новости и дискуссии за последние 7 дней.

Затем:
1. Определи топ-5 самых горячих тем
2. Напиши посты для: ${platformList.join(' и ')}

Форматы постов:
- Один "educational" (инсайт или факт)  
- Один "opinion" (непопулярное мнение или спорная точка зрения)
- Один "engaging" (вопрос или призыв к дискуссии)

Верни JSON строго по схеме из системного промпта.`;

  try {
    setStatus('Запрос к Claude с веб-поиском...', 'Это займёт 30-60 секунд');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        system: systemPrompt,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    setStatus('Анализируем тренды и пишем посты...', 'Почти готово');

    const data = await response.json();

    // Extract text from all content blocks
    const fullText = data.content
      .map(b => b.type === 'text' ? b.text : '')
      .filter(Boolean)
      .join('\n');

    // Parse JSON from response
    let parsed;
    try {
      const jsonMatch = fullText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('JSON не найден в ответе');
      let clean = jsonMatch[0].replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch (e) {
      throw new Error('Не удалось разобрать ответ. Попробуйте ещё раз.');
    }

    renderResults(parsed, wantLinkedIn, wantX);

  } catch (err) {
    showError('Ошибка: ' + err.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('statusBar').classList.remove('visible');
  }
}

function renderResults(data, wantLinkedIn, wantX) {
  const trends = data.trends || [];
  const posts = (data.posts || []).filter(p => {
    if (p.platform === 'linkedin' && !wantLinkedIn) return false;
    if (p.platform === 'x' && !wantX) return false;
    return true;
  });

  let html = '';

  if (trends.length) {
    html += `<div class="trends-section card">
      <div class="card-title">🔥 Горячие тренды сегодня</div>
      <div class="trends-grid">`;
    trends.forEach(t => {
      html += `<div class="trend-chip">
        <div class="trend-num">#${t.rank}</div>
        <div class="trend-name">${escHtml(t.topic)}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (posts.length) {
    html += `<div class="section-label">Готовые посты (${posts.length})</div>`;
    html += `<div class="posts-section">`;
    posts.forEach((post, i) => {
      const isLinkedIn = post.platform === 'linkedin';
      const platformLabel = isLinkedIn ? 'LinkedIn' : 'X (Twitter)';
      const badgeClass = isLinkedIn ? 'badge-linkedin' : 'badge-x';
      const typeMap = { educational: 'Образовательный', opinion: 'Мнение', engaging: 'Вовлечение' };
      const typeLabel = typeMap[post.type] || post.type;
      const chars = post.content.length;

      html += `<div class="post-card" style="animation-delay: ${i * 0.1}s">
        <div class="post-header">
          <div class="post-meta">
            <span class="platform-badge ${badgeClass}">${platformLabel}</span>
            <span class="post-type">${typeLabel}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:11px;color:#444">${chars} симв.</span>
            <button class="btn-copy btn" onclick="copyPost(this, ${i})">Копировать</button>
          </div>
        </div>
        <div class="post-body" id="post-content-${i}">${escHtml(post.content)}</div>
        <div class="post-footer"></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html = `<div class="empty-state">
      <div class="empty-icon">🤔</div>
      <h3>Постов не найдено</h3>
      <p>Попробуйте другую нишу или перезапустите.</p>
    </div>`;
  }

  document.getElementById('output').innerHTML = html;
}

function copyPost(btn, idx) {
  const el = document.getElementById('post-content-' + idx);
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ Скопировано';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.getElementById('nicheInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
