<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Content Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
  }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }

  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  .card {
    background: #16161f;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .input-row { display: flex; gap: 12px; }

  input[type="text"],
  input[type="password"] {
    flex: 1;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e8e8f0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="password"]:focus { border-color: #7c3aed; }
  input[type="text"]::placeholder,
  input[type="password"]::placeholder { color: #444; }

  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: white;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-copy {
    background: #1e1e2e;
    color: #aaa;
    border: 1px solid #2a2a3a;
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn-copy:hover { color: #fff; border-color: #555; }

  .platforms { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

  .platform-toggle {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .platform-toggle.active {
    background: #7c3aed22;
    border-color: #7c3aed;
    color: #a78bfa;
  }

  .status-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: #0f0f13;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    margin-bottom: 24px;
  }

  .status-bar.visible { display: flex; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #2a2a3a;
    border-top-color: #7c3aed;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-text { font-size: 14px; color: #888; }
  .status-step { font-size: 12px; color: #555; margin-top: 2px; }

  .trends-section { margin-bottom: 24px; }

  .trends-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }

  .trend-chip {
    background: #0f0f13;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
  }

  .trend-chip .trend-num {
    font-size: 11px;
    color: #7c3aed;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .trend-chip .trend-name { color: #ccc; font-weight: 500; }

  .posts-section { display: flex; flex-direction: column; gap: 20px; }

  .post-card {
    background: #16161f;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #1e1e2e;
    background: #0f0f13;
  }

  .post-meta { display: flex; align-items: center; gap: 10px; }

  .platform-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .badge-linkedin { background: #0a66c233; color: #5ba4f5; border: 1px solid #0a66c244; }
  .badge-x { background: #ffffff14; color: #ccc; border: 1px solid #ffffff22; }

  .post-type {
    font-size: 12px;
    color: #555;
    background: #1e1e2e;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .post-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    display: flex;
    justify-content: flex-end;
    padding: 10px 14px;
    border-top: 1px solid #1e1e2e;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #444;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; color: #555; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .section-label {
    font-size: 12px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .error-msg {
    background: #2a1515;
    border: 1px solid #4a2020;
    border-radius: 10px;
    padding: 14px 18px;
    color: #f87171;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .customize-toggle {
    background: none;
    border: none;
    color: #7c3aed;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 0;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .customize-toggle:hover { color: #a78bfa; }
  .customize-toggle .arrow { transition: transform 0.2s; }
  .customize-toggle.expanded .arrow { transform: rotate(90deg); }

  .customize-section {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #1e1e2e;
  }
  .customize-section.visible { display: block; }

  .customize-row {
    margin-bottom: 16px;
  }
  .customize-row:last-child { margin-bottom: 0; }
  .customize-row label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
  }
  select {
    width: 100%;
    max-width: 280px;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 10px 14px;
    color: #e8e8f0;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #7c3aed; }
  textarea {
    width: 100%;
    min-height: 80px;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e8e8f0;
    font-size: 14px;
    outline: none;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { border-color: #7c3aed; }
  textarea::placeholder { color: #444; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">✦</div>
  <div>
    <h1>Social Content Generator</h1>
    <p>Trends → Posts in minutes, no Co-work needed</p>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Claude API key</div>
    <div class="input-row" style="margin-bottom: 16px;">
      <input type="password" id="apiKeyInput" placeholder="Paste your Anthropic API key (console.anthropic.com)" autocomplete="off" />
    </div>
    <div class="card-title">Your niche</div>
    <div class="input-row">
      <input type="text" id="nicheInput" placeholder="E.g.: AI in business, SaaS marketing, Web3..." value="AI in business" />
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">
        Generate →
      </button>
    </div>
    <div class="platforms">
      <button class="platform-toggle active" id="toggle-linkedin" onclick="togglePlatform('linkedin')">LinkedIn</button>
      <button class="platform-toggle active" id="toggle-x" onclick="togglePlatform('x')">X (Twitter)</button>
    </div>
    <button type="button" class="customize-toggle" id="customizeToggle" onclick="toggleCustomize()">
      <span class="arrow">▶</span> Customize prompt
    </button>
    <div class="customize-section" id="customizeSection">
      <div class="customize-row">
        <label>Language</label>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="ru">Russian</option>
        </select>
      </div>
      <div class="customize-row">
        <label>Tone</label>
        <select id="toneSelect">
          <option value="professional">Professional</option>
          <option value="casual">Casual</option>
          <option value="provocative">Provocative</option>
          <option value="thoughtful">Thoughtful</option>
        </select>
      </div>
      <div class="customize-row">
        <label>Target audience (optional)</label>
        <input type="text" id="audienceInput" placeholder="E.g.: startup founders, B2B marketers..." />
      </div>
      <div class="customize-row">
        <label>Custom instructions (optional)</label>
        <textarea id="customInstructions" placeholder="Add any extra instructions for the AI. E.g.: Avoid mentioning competitors, focus on ROI..."></textarea>
      </div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <div>
      <div class="status-text" id="statusText">Searching for trends...</div>
      <div class="status-step" id="statusStep">Analyzing recent posts</div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="output">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <h3>Enter your niche and hit Generate</h3>
      <p>The system will find hot trends and create<br>ready-to-post content for LinkedIn and X</p>
    </div>
  </div>

</div>

<script>
const platforms = { linkedin: true, x: true };

function togglePlatform(p) {
  platforms[p] = !platforms[p];
  document.getElementById('toggle-' + p).classList.toggle('active', platforms[p]);
}

function toggleCustomize() {
  const section = document.getElementById('customizeSection');
  const btn = document.getElementById('customizeToggle');
  section.classList.toggle('visible');
  btn.classList.toggle('expanded', section.classList.contains('visible'));
}

function setStatus(text, step) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusStep').textContent = step;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

async function generate() {
  const niche = document.getElementById('nicheInput').value.trim();
  if (!niche) return;

  const wantLinkedIn = platforms.linkedin;
  const wantX = platforms.x;

  if (!wantLinkedIn && !wantX) {
    showError('Please select at least one platform.');
    return;
  }

  hideError();
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('statusBar').classList.add('visible');
  document.getElementById('output').innerHTML = '';

  setStatus('Searching for trending topics...', `Niche: "${niche}"`);

  const platformList = [];
  if (wantLinkedIn) platformList.push('LinkedIn (3 posts)');
  if (wantX) platformList.push('X/Twitter (3 posts, max 280 characters each)');

  const lang = document.getElementById('langSelect').value;
  const tone = document.getElementById('toneSelect').value;
  const audience = document.getElementById('audienceInput').value.trim();
  const customInstructions = document.getElementById('customInstructions').value.trim();

  const langNote = lang === 'ru' ? 'All post content must be in Russian.' : 'All post content must be in English.';
  const toneMap = {
    professional: 'professional but conversational',
    casual: 'casual and friendly',
    provocative: 'provocative and bold, spark debate',
    thoughtful: 'thoughtful and reflective'
  };
  const toneDesc = toneMap[tone] || toneMap.professional;
  const audienceNote = audience ? `Target audience: ${audience}.` : '';
  const customNote = customInstructions ? `\nAdditional instructions: ${customInstructions}` : '';

  const systemPrompt = `You are an expert content marketer and social media trend analyst. You create viral, human-sounding content based on real current trends.

Your posts:
- Sound like a real person, not an AI
- Avoid clichés ("In today's world...", "Let's talk about...")
- Use emojis sparingly (max 1-2 if fitting)
- Vary in format: some are insights, some are opinions, some spark discussion
- Tone: ${toneDesc}
- LinkedIn posts: 150-300 words
- X posts: strictly under 280 characters, sharp and punchy
${audienceNote ? `- ${audienceNote}` : ''}${customNote}

Respond ONLY in JSON format (no markdown wrapper, no explanation), strictly following this schema:
{
  "trends": [
    {"rank": 1, "topic": "..."},
    {"rank": 2, "topic": "..."},
    {"rank": 3, "topic": "..."},
    {"rank": 4, "topic": "..."},
    {"rank": 5, "topic": "..."}
  ],
  "posts": [
    {
      "platform": "linkedin",
      "type": "educational|opinion|engaging",
      "content": "..."
    }
  ]
}`;

  const audienceContext = audience ? ` Focus on content relevant to: ${audience}.` : '';
  const userPrompt = `Use web search to find the hottest trends right now in this niche: "${niche}".${audienceContext}

Find relevant posts, news, and discussions from the last 7 days.

Then:
1. Identify the top 5 hottest topics
2. Write posts for: ${platformList.join(' and ')}

Post formats:
- One "educational" (insight or fact)
- One "opinion" (unpopular or contrarian take)
- One "engaging" (question or call to discussion)

Return JSON strictly following the schema from the system prompt. ${langNote}`;

  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) {
    showError('Enter your Claude API key. Get one at console.anthropic.com');
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('statusBar').classList.remove('visible');
    return;
  }

  try {
    setStatus('Calling Claude with web search...', 'This will take 30–60 seconds');

    const requestBody = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 3000,
      system: systemPrompt,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: userPrompt }]
    };
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey, body: requestBody })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    setStatus('Analyzing trends and writing posts...', 'Almost done');

    const data = await response.json();

    // Extract text from all content blocks
    const fullText = data.content
      .map(b => b.type === 'text' ? b.text : '')
      .filter(Boolean)
      .join('\n');

    // Parse JSON from response
    let parsed;
    try {
      const jsonMatch = fullText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('No JSON found in response');
      let clean = jsonMatch[0].replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch (e) {
      throw new Error('Could not parse response. Please try again.');
    }

    renderResults(parsed, wantLinkedIn, wantX);

  } catch (err) {
    showError('Error: ' + err.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('statusBar').classList.remove('visible');
  }
}

function renderResults(data, wantLinkedIn, wantX) {
  const trends = data.trends || [];
  const posts = (data.posts || []).filter(p => {
    if (p.platform === 'linkedin' && !wantLinkedIn) return false;
    if (p.platform === 'x' && !wantX) return false;
    return true;
  });

  let html = '';

  if (trends.length) {
    html += `<div class="trends-section card">
      <div class="card-title">🔥 Today's hot trends</div>
      <div class="trends-grid">`;
    trends.forEach(t => {
      html += `<div class="trend-chip">
        <div class="trend-num">#${t.rank}</div>
        <div class="trend-name">${escHtml(t.topic)}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (posts.length) {
    html += `<div class="section-label">Ready to post (${posts.length})</div>`;
    html += `<div class="posts-section">`;
    posts.forEach((post, i) => {
      const isLinkedIn = post.platform === 'linkedin';
      const platformLabel = isLinkedIn ? 'LinkedIn' : 'X (Twitter)';
      const badgeClass = isLinkedIn ? 'badge-linkedin' : 'badge-x';
      const typeMap = { educational: 'Educational', opinion: 'Opinion', engaging: 'Engaging' };
      const typeLabel = typeMap[post.type] || post.type;
      const chars = post.content.length;

      html += `<div class="post-card" style="animation-delay: ${i * 0.1}s">
        <div class="post-header">
          <div class="post-meta">
            <span class="platform-badge ${badgeClass}">${platformLabel}</span>
            <span class="post-type">${typeLabel}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:11px;color:#444">${chars} chars</span>
            <button class="btn-copy btn" onclick="copyPost(this, ${i})">Copy</button>
          </div>
        </div>
        <div class="post-body" id="post-content-${i}">${escHtml(post.content)}</div>
        <div class="post-footer"></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html = `<div class="empty-state">
      <div class="empty-icon">🤔</div>
      <h3>No posts found</h3>
      <p>Try a different niche or run again.</p>
    </div>`;
  }

  document.getElementById('output').innerHTML = html;
}

function copyPost(btn, idx) {
  const el = document.getElementById('post-content-' + idx);
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.getElementById('nicheInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
